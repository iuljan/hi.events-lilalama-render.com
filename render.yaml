services:
  - type: web
    name: lila-lama-tix
    region: frankfurt
    plan: free
    autoDeploy: false
    runtime: docker
    repo: https://github.com/HiEventsDev/hi.events-render.com.git
    envVars:
      - key: PORT
        value: 80
      - key: DATABASE_URL
        fromDatabase:
          name: lila-lama-tix-db
          property: connectionString
      - key: APP_KEY
        value: base64:G/ZFls3twiNLjiGrC0W2Zs475ZWxH4UsuvAV4u24wOE=
      - key: JWT_SECRET
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_PUBLIC_DISK
        value: public
      - key: FILESYSTEM_PRIVATE_DISK
        value: local
      - key: MAIL_MAILER
        value: array
      - key: MAIL_ENCRYPTION
        value: array
      - key: MAIL_FROM_ADDRESS
        value: array
      - key: MAIL_FROM_NAME
        value: array
      - key: MAIL_HOST
        value: array
      - key: MAIL_PASSWORD
        value: array
      - key: MAIL_PORT
        value: array
      - key: MAIL_USERNAME
        value: array
      - key: STRIPE_PUBLIC_KEY
        value: array
      - key: STRIPE_SECRET_KEY
        value: array
      - key: STRIPE_WEBHOOK_SECRET
        value: array
      - key: VITE_API_URL_CLIENT
        value: array
      - key: VITE_API_URL_SERVER
        value: array
      - key: VITE_FRONTEND_URL
        value: array
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        value: array

databases:
  - name: lila-lama-tix-db
    region: frankfurt
    plan: free
