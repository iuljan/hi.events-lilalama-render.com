services:
  - type: web
    name: lila-lama-tix
    region: frankfurt
    plan: starter
    autoDeploy: false
    runtime: docker
    repo: https://github.com/iuljan/hi.events-lilalama-render.com.git
    envVars:
      - key: PORT
        value: 80
      - key: DATABASE_URL
        fromDatabase:
          name: lila-lama-tix-db
          property: connectionString
      - key: APP_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: QUEUE_CONNECTION
        value: sync
      - key: MAIL_MAILER
        value: smtp
      - key: FILESYSTEM_PUBLIC_DISK
        value: public
      - key: FILESYSTEM_PRIVATE_DISK
        value: local
      - key: VITE_FRONTEND_URL
        value: https://tix.lilalamacamp.de
 

databases:
  - name: lila-lama-tix-db
    region: frankfurt
    plan: free
